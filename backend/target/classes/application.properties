# Server
server.port=8080

# Database - update with your credentials
spring.datasource.url=jdbc:mysql://localhost:3306/eventhub_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=eventhub-super-secret-key-2026-change-in-production-min-256-bits
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Max attendees per event
event.max-attendees=350

# Logging
logging.level.com.eventhub=INFO